<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: block;
        }
        .form-control.is-invalid {
            border-color: #dc3545;
            background-image: none;
        }
        .form-control.is-invalid:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-header bg-dark text-white text-center">
                    <h4>?? Bus Ticket Pro - Đăng nhập</h4>
                </div>
                <div class="card-body">
                    <div th:if="${param.error}" class="alert alert-danger">Sai tên đăng nhập hoặc mật khẩu!</div>
                    <div th:if="${param.logout}" class="alert alert-info">Đã đăng xuất thành công.</div>
                    <div th:if="${param.registered}" class="alert alert-success">Đăng ký thành công! Hãy đăng nhập.</div>
                    <form th:action="@{/auth/login}" method="post" id="loginForm" novalidate>
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập</label>
                            <input type="text" name="username" class="form-control" id="username" autofocus>
                            <div class="error-message" id="username-error" style="display: none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu</label>
                            <input type="password" name="password" class="form-control" id="password">
                            <div class="error-message" id="password-error" style="display: none;"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng nhập</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <small>Chưa có tài khoản? <a th:href="@{/auth/register}">Đăng ký ngay</a></small><br>
                        <small class="text-muted">Demo: admin/admin123 | staff/staff123 | passenger/pass123</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('loginForm');
    
    // Real-time validation
    document.getElementById('username').addEventListener('input', validateUsername);
    document.getElementById('password').addEventListener('input', validatePassword);
    
    function validateUsername() {
        const field = document.getElementById('username');
        const error = document.getElementById('username-error');
        const value = field.value.trim();
        
        if (!value) {
            showError(field, error, 'Tên đăng nhập không được để trống');
        } else {
            clearError(field, error);
        }
    }
    
    function validatePassword() {
        const field = document.getElementById('password');
        const error = document.getElementById('password-error');
        const value = field.value;
        
        if (!value) {
            showError(field, error, 'Mật khẩu không được để trống');
        } else {
            clearError(field, error);
        }
    }
    
    function showError(field, errorElement, message) {
        field.classList.add('is-invalid');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
    }
    
    function clearError(field, errorElement) {
        field.classList.remove('is-invalid');
        errorElement.style.display = 'none';
    }
    
    // Form submission validation
    form.addEventListener('submit', function(e) {
        validateUsername();
        validatePassword();
        
        const invalidFields = form.querySelectorAll('.is-invalid');
        if (invalidFields.length > 0) {
            e.preventDefault();
            invalidFields[0].focus();
        }
    });
});
</script>

</body>
</html>
