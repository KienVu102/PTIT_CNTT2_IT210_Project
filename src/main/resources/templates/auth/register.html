<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ký - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .error-message {
            color: #dc3545;
            font-size: 0.875rem;
            margin-top: 0.25rem;
            display: block;
        }
        .form-control.is-invalid {
            border-color: #dc3545;
            background-image: none;
        }
        .form-control.is-invalid:focus {
            border-color: #dc3545;
            box-shadow: 0 0 0 0.25rem rgba(220, 53, 69, 0.25);
        }
    </style>
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card shadow">
                <div class="card-header bg-primary text-white text-center">
                    <h4>?? Đăng ký tài khoản Hành khách</h4>
                </div>
                <div class="card-body">
                    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                    <form th:action="@{/auth/register}" th:object="${registerDTO}" method="post" novalidate id="registerForm">
                        <div class="mb-3">
                            <label class="form-label">Tên đăng nhập *</label>
                            <input type="text" class="form-control" th:field="*{username}" th:classappend="${#fields.hasErrors('username')} ? 'is-invalid'" id="username">
                            <div class="error-message" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
                            <div class="error-message" id="username-error" style="display: none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu *</label>
                            <input type="password" class="form-control" th:field="*{password}" th:classappend="${#fields.hasErrors('password')} ? 'is-invalid'" id="password">
                            <div class="error-message" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
                            <div class="error-message" id="password-error" style="display: none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Họ và tên *</label>
                            <input type="text" class="form-control" th:field="*{fullName}" th:classappend="${#fields.hasErrors('fullName')} ? 'is-invalid'" id="fullName">
                            <div class="error-message" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></div>
                            <div class="error-message" id="fullName-error" style="display: none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại *</label>
                            <input type="text" class="form-control" th:field="*{phone}" th:classappend="${#fields.hasErrors('phone')} ? 'is-invalid'" id="phone">
                            <div class="error-message" th:if="${#fields.hasErrors('phone')}" th:errors="*{phone}"></div>
                            <div class="error-message" id="phone-error" style="display: none;"></div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:field="*{email}" th:classappend="${#fields.hasErrors('email')} ? 'is-invalid'" id="email">
                            <div class="error-message" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></div>
                            <div class="error-message" id="email-error" style="display: none;"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Đăng ký</button>
                    </form>
                    <hr>
                    <div class="text-center">
                        <small>Đã có tài khoản? <a th:href="@{/auth/login}">Đăng nhập</a></small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('registerForm');
    
    // Real-time validation
    document.getElementById('username').addEventListener('input', validateUsername);
    document.getElementById('password').addEventListener('input', validatePassword);
    document.getElementById('fullName').addEventListener('input', validateFullName);
    document.getElementById('phone').addEventListener('input', validatePhone);
    document.getElementById('email').addEventListener('input', validateEmail);
    
    function validateUsername() {
        const field = document.getElementById('username');
        const error = document.getElementById('username-error');
        const value = field.value.trim();
        
        if (!value) {
            showError(field, error, 'Tên đăng nhập không được để trống');
        } else if (value.length < 4 || value.length > 50) {
            showError(field, error, 'Tên đăng nhập phải 4-50 ký tự');
        } else {
            clearError(field, error);
        }
    }
    
    function validatePassword() {
        const field = document.getElementById('password');
        const error = document.getElementById('password-error');
        const value = field.value;
        
        if (!value) {
            showError(field, error, 'Mật khẩu không được để trống');
        } else if (value.length < 6) {
            showError(field, error, 'Mật khẩu phải ít nhất 6 ký tự');
        } else {
            clearError(field, error);
        }
    }
    
    function validateFullName() {
        const field = document.getElementById('fullName');
        const error = document.getElementById('fullName-error');
        const value = field.value.trim();
        
        if (!value) {
            showError(field, error, 'Họ tên không được để trống');
        } else {
            clearError(field, error);
        }
    }
    
    function validatePhone() {
        const field = document.getElementById('phone');
        const error = document.getElementById('phone-error');
        const value = field.value.trim();
        
        if (!value) {
            showError(field, error, 'Số điện thoại không được để trống');
        } else if (!/^[0-9]{10,11}$/.test(value)) {
            showError(field, error, 'Số điện thoại phải là 10-11 số');
        } else {
            clearError(field, error);
        }
    }
    
    function validateEmail() {
        const field = document.getElementById('email');
        const error = document.getElementById('email-error');
        const value = field.value.trim();
        
        if (value && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value)) {
            showError(field, error, 'Email không hợp lệ');
        } else {
            clearError(field, error);
        }
    }
    
    function showError(field, errorElement, message) {
        field.classList.add('is-invalid');
        errorElement.textContent = message;
        errorElement.style.display = 'block';
    }
    
    function clearError(field, errorElement) {
        field.classList.remove('is-invalid');
        errorElement.style.display = 'none';
    }
    
    // Form submission validation
    form.addEventListener('submit', function(e) {
        validateUsername();
        validatePassword();
        validateFullName();
        validatePhone();
        validateEmail();
        
        const invalidFields = form.querySelectorAll('.is-invalid');
        if (invalidFields.length > 0) {
            e.preventDefault();
            invalidFields[0].focus();
        }
    });
});
</script>

</body>
</html>
