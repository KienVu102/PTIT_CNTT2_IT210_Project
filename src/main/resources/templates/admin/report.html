<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Báo cáo - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { background: #212529; min-height: 100vh; }
        .stat-card { border: none; border-radius: 12px; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
        .chart-placeholder { height: 200px; display: flex; align-items: center; justify-content: center; background: #f8f9fa; border-radius: 12px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bus-front"></i> Bus Ticket Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span sec:authentication="name"></span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Hồ sơ</a></li>
                        <li><form th:action="@{/auth/logout}" method="post" style="margin:0;"><button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button></form></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar text-white p-3 d-none d-md-block">
            <h6 class="text-uppercase text-muted mb-3 mt-2">Quản trị</h6>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white active bg-primary rounded" href="/admin/reports"><i class="bi bi-graph-up"></i> Báo cáo</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/trips"><i class="bi bi-calendar-event"></i> Chuyến xe</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/buses"><i class="bi bi-bus-front"></i> Xe buýt</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/staff/pending-tickets"><i class="bi bi-clipboard-check"></i> Duyệt vé</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-speedometer2"></i> Tổng quan hệ thống</h3>

            <div class="row g-4 mb-4">
                <div class="col-md-3">
                    <div class="card stat-card bg-primary text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">Doanh thu</h6>
                                    <h4 class="mb-0" th:text="${#numbers.formatInteger(revenue, 3, 'COMMA')} + ' d'"></h4>
                                </div>
                                <i class="bi bi-cash-stack fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-success text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">Vé để thanh toán</h6>
                                    <h4 class="mb-0" th:text="${paidCount}"></h4>
                                </div>
                                <i class="bi bi-check-circle fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-warning text-dark">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">Vé chờ thanh toán</h6>
                                    <h4 class="mb-0" th:text="${pendingCount}"></h4>
                                </div>
                                <i class="bi bi-clock-history fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card stat-card bg-secondary text-white">
                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-center">
                                <div>
                                    <h6 class="mb-1">Vé d? hủy</h6>
                                    <h4 class="mb-0" th:text="${cancelledCount}"></h4>
                                </div>
                                <i class="bi bi-x-circle fs-1 opacity-50"></i>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold"><i class="bi bi-trophy"></i> Top tuyến đường được đặt nhiều nhất</div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                                <tr>
                                    <th>#</th>
                                    <th>Tuyến đường</th>
                                    <th>Số vé đã bán</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="row, iter : ${topRoutes}">
                                    <td><span class="badge bg-primary" th:text="${iter.count}"></span></td>
                                    <td th:text="${row[0]} + ' ? ' + ${row[1]}"></td>
                                    <td><span class="fw-bold" th:text="${row[2]}"></span></td>
                                </tr>
                                <tr th:if="${topRoutes == null or topRoutes.isEmpty()}">
                                    <td colspan="3" class="text-center text-muted">Chưa có dữ liệu</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
