<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa chuyến xe - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { background: #212529; min-height: 100vh; }
        .page-title { letter-spacing: 0; }
        .form-card { border-radius: 14px; }
        .form-card .card-header { border-bottom: 1px solid #eef1f4; }
        .help-note { font-size: 0.9rem; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bus-front"></i> Bus Ticket Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span sec:authentication="name"></span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Hồ sơ</a></li>
                        <li><form th:action="@{/auth/logout}" method="post" style="margin:0;"><button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button></form></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar text-white p-3 d-none d-md-block">
            <h6 class="text-uppercase text-muted mb-3 mt-2">Quản trị</h6>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/reports"><i class="bi bi-graph-up"></i> Báo cáo</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white active bg-primary rounded" href="/admin/trips"><i class="bi bi-calendar-event"></i> Chuyến xe</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/buses"><i class="bi bi-bus-front"></i> Xe buýt</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/staff/pending-tickets"><i class="bi bi-clipboard-check"></i> Duyệt vé</a></li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <div class="d-flex align-items-center justify-content-between flex-wrap gap-2 mb-3">
                <h3 class="fw-bold mb-0 page-title"><i class="bi bi-pencil-square"></i> Sửa thông tin chuyến xe</h3>
                <div class="text-muted small" th:if="${trip != null}">ID: <span class="fw-semibold" th:text="${trip.id}"></span></div>
            </div>
            <div th:if="${error}" class="alert alert-danger"><i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span></div>

            <div class="card border-0 shadow-sm form-card" style="max-width: 980px;">
                <div class="card-header bg-white fw-bold">
                    <i class="bi bi-sliders"></i> Cập nhật thông tin
                </div>
                <div class="card-body">
                    <div th:if="${hasTickets}" class="alert alert-warning d-flex gap-2 align-items-start mb-3">
                        <i class="bi bi-info-circle mt-1"></i>
                        <div class="help-note">Chuyến xe này đã có vé. Bạn chỉ được sửa <strong>thời gian khởi hành</strong> và <strong>giá vé</strong>.</div>
                    </div>
                    <form th:action="@{/admin/trips/edit/{id}(id=${trip.id})}" th:object="${tripDTO}" method="post" class="row g-3">
                        <input type="hidden" th:if="${hasTickets}" th:field="*{routeId}">
                        <div class="col-md-6">
                            <label class="form-label">Điểm đi</label>
                            <select class="form-select" th:field="*{fromLocationId}" th:disabled="${hasTickets}" required>
                                <option value="">Chọn điểm đi...</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                            </select>
                            <input type="hidden" th:if="${hasTickets}" th:field="*{fromLocationId}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Điểm đến</label>
                            <select class="form-select" th:field="*{toLocationId}" th:disabled="${hasTickets}" required>
                                <option value="">Chọn điểm đến...</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                            </select>
                            <input type="hidden" th:if="${hasTickets}" th:field="*{toLocationId}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Xe</label>
                            <select class="form-select" th:field="*{busId}" th:disabled="${hasTickets}" required>
                                <option th:each="b : ${buses}" th:value="${b.id}" th:text="${b.plateNumber} + ' (' + ${b.busType} + ')'"></option>
                            </select>
                            <input type="hidden" th:if="${hasTickets}" th:field="*{busId}">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Thời gian khởi hành</label>
                            <input type="datetime-local" class="form-control" th:field="*{departureTime}" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Giá vé</label>
                            <div class="input-group">
                                <input type="number" class="form-control" th:field="*{price}" min="0" step="1000" required>
                                <span class="input-group-text">đ</span>
                            </div>
                        </div>
                        <div class="col-12">
                            <div class="form-text text-muted">Chọn trực tiếp điểm đi và điểm đến để cập nhật tuyến của chuyến xe.</div>
                        </div>

                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu thay đổi</button>
                            <a href="/admin/trips" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
