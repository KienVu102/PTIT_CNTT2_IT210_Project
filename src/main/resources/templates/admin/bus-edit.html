<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa xe buýt - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { background: #212529; min-height: 100vh; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bus-front"></i> Bus Ticket Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span sec:authentication="name"></span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Hồ sơ</a></li>
                        <li><form th:action="@{/auth/logout}" method="post" style="margin:0;"><button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button></form></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar text-white p-3 d-none d-md-block">
            <h6 class="text-uppercase text-muted mb-3 mt-2">Quản trị</h6>
            <ul class="nav flex-column">
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/reports"><i class="bi bi-graph-up"></i> Báo cáo</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/admin/trips"><i class="bi bi-calendar-event"></i> Chuyến xe</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white active bg-primary rounded" href="/admin/buses"><i class="bi bi-bus-front"></i> Xe buýt</a></li>
                <li class="nav-item mb-2"><a class="nav-link text-white" href="/staff/pending-tickets"><i class="bi bi-clipboard-check"></i> Duyệt vé</a></li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-pencil-square"></i> Sửa thông tin xe buýt</h3>

            <div class="card border-0 shadow-sm" style="max-width: 600px;">
                <div class="card-body">
                    <form th:action="@{/admin/buses/edit/{id}(id=${bus.id})}" th:object="${bus}" method="post" class="row g-3">
                        <div class="col-md-6"><label class="form-label">Biển số</label><input type="text" class="form-control" th:field="*{plateNumber}" required></div>
                        <div class="col-md-6">
                            <label class="form-label">Loại xe</label>
                            <select class="form-select" th:field="*{busType}" required>
                                <option value="Ghế ngồi">Ghế ngồi</option>
                                <option value="Giường nằm">Giường nằm</option>
                                <option value="Limousine">Limousine</option>
                            </select>
                        </div>
                        <div class="col-md-6"><label class="form-label">Số ghế</label><input type="number" class="form-control" th:field="*{totalSeats}" min="1" required></div>
                        <div class="col-md-6"><label class="form-label">Công ty</label><input type="text" class="form-control" th:field="*{company}" required></div>
                        <div class="col-md-6"><label class="form-label">Tài xế</label><input type="text" class="form-control" th:field="*{driverName}" required></div>
                        <div class="col-12 d-flex gap-2">
                            <button type="submit" class="btn btn-primary"><i class="bi bi-check-lg"></i> Lưu thay đổi</button>
                            <a href="/admin/buses" class="btn btn-outline-secondary"><i class="bi bi-arrow-left"></i> Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
