<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý chuyến xe - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        .admin-sidebar { background: #212529; min-height: 100vh; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bus-front"></i> Bus Ticket Pro</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span sec:authentication="name"></span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Hồ sơ</a></li>
                        <li><form th:action="@{/auth/logout}" method="post" style="margin:0;"><button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button></form></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <div class="row">
        <div class="col-md-2 admin-sidebar text-white p-3 d-none d-md-block">
            <h6 class="text-uppercase text-muted mb-3 mt-2">Quản trị</h6>
            <ul class="nav flex-column">
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/reports"><i class="bi bi-graph-up"></i> Báo cáo</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white active bg-primary rounded" href="/admin/trips"><i class="bi bi-calendar-event"></i> Chuyến xe</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/admin/buses"><i class="bi bi-bus-front"></i> Xe buýt</a>
                </li>
                <li class="nav-item mb-2">
                    <a class="nav-link text-white" href="/staff/pending-tickets"><i class="bi bi-clipboard-check"></i> Duyệt vé</a>
                </li>
            </ul>
        </div>

        <div class="col-md-10 p-4">
            <h3 class="fw-bold mb-4"><i class="bi bi-calendar-event"></i> Quản lý chuyến xe</h3>

            <div th:if="${error}" class="alert alert-danger">
                <i class="bi bi-exclamation-triangle"></i> <span th:text="${error}"></span>
            </div>

            <div class="card border-0 shadow-sm mb-4">
                <div class="card-header bg-white fw-bold"><i class="bi bi-plus-circle"></i> Thêm chuyến xe mới</div>
                <div class="card-body">
                    <form th:action="@{/admin/trips}" th:object="${newTrip}" method="post" class="row g-3">
                        <div class="col-md-2">
                            <label class="form-label">Điểm đi</label>
                            <select class="form-select" th:field="*{fromLocationId}" required>
                                <option value="">Chọn điểm đi...</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-2">
                            <label class="form-label">Điểm đến</label>
                            <select class="form-select" th:field="*{toLocationId}" required>
                                <option value="">Chọn điểm đến...</option>
                                <option th:each="loc : ${locations}" th:value="${loc.id}" th:text="${loc.name}"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Xe buýt</label>
                            <select class="form-select" th:field="*{busId}" required>
                                <option value="">Chọn xe...</option>
                                <option th:each="b : ${buses}" th:value="${b.id}" th:text="${b.plateNumber} + ' (' + ${b.busType} + ')'"></option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">Thời gian khởi hành</label>
                            <input type="datetime-local" class="form-control" th:field="*{departureTime}" required>
                        </div>
                        <div class="col-md-1">
                            <label class="form-label">Giá vé</label>
                            <input type="number" class="form-control" th:field="*{price}" min="0" step="1000" required>
                        </div>
                        <div class="col-md-1 d-flex align-items-end">
                            <button type="submit" class="btn btn-success w-100"><i class="bi bi-check-lg"></i></button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-header bg-white fw-bold"><i class="bi bi-list-ul"></i> Danh sách chuyến xe</div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>Tuyến đường</th>
                                    <th>Xe</th>
                                    <th>Khởi hành</th>
                                    <th>Giá</th>
                                    <th>Thao tác</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="trip : ${trips}">
                                    <td th:text="${trip.id}"></td>
                                    <td th:text="${trip.fromLocation} + ' → ' + ${trip.toLocation}"></td>
                                    <td th:text="${trip.plateNumber} + ' (' + ${trip.busType} + ')'"></td>
                                    <td th:text="${#temporals.format(trip.departureTime, 'HH:mm dd/MM/yyyy')}"></td>
                                    <td th:text="${#numbers.formatInteger(trip.price, 3, 'COMMA')} + ' đ'"></td>
                                    <td class="text-nowrap">
                                        <div class="btn-group btn-group-sm" role="group" aria-label="Trip actions">
                                            <a th:href="@{/admin/trips/edit/{id}(id=${trip.id})}" class="btn btn-outline-primary"><i class="bi bi-pencil"></i></a>
                                            <a th:href="@{/admin/trips/delete/{id}(id=${trip.id})}" class="btn btn-outline-danger" onclick="return confirm('Xóa chuyến xe này?')"><i class="bi bi-trash"></i></a>
                                        </div>
                                    </td>
                                </tr>
                                <tr th:if="${trips == null or trips.isEmpty()}">
                                    <td colspan="6" class="text-center text-muted py-4">Chưa có chuyến xe nào</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
