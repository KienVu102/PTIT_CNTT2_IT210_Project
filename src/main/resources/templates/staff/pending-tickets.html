<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Duyệt vé - Bus Ticket Pro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/"><i class="bi bi-bus-front"></i> Bus Ticket Pro</a>
        <span class="navbar-text text-white ms-3 d-none d-lg-block"><i class="bi bi-clipboard-check"></i> Trang Nhân viên</span>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="mainNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door"></i> Trang chủ</a></li>
                <li class="nav-item" sec:authorize="hasRole('ADMIN')"><a class="nav-link" href="/admin/reports"><i class="bi bi-speedometer2"></i> Admin</a></li>
                <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                    <a class="nav-link dropdown-toggle" href="#" data-bs-toggle="dropdown"><i class="bi bi-person-circle"></i> <span sec:authentication="name"></span></a>
                    <ul class="dropdown-menu dropdown-menu-end">
                        <li><a class="dropdown-item" href="/profile"><i class="bi bi-person"></i> Hồ sơ</a></li>
                        <li><form th:action="@{/auth/logout}" method="post" style="margin:0;"><button type="submit" class="dropdown-item"><i class="bi bi-box-arrow-right"></i> Đăng xuất</button></form></li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>
<div class="container">
    <h2 class="mb-4 text-warning">Danh sách vé chờ thanh toán (PENDING)</h2>
    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
    <div th:if="${tickets.isEmpty()}" class="alert alert-info">Không có vé nào đang chờ thanh toán.</div>

    <table class="table table-striped table-bordered" th:if="${!tickets.isEmpty()}">
        <thead class="table-dark">
        <tr>
            <th>Mã vé</th>
            <th>Tên khách</th>
            <th>SDT</th>
            <th>Tuyến</th>
            <th>Khởi hành</th>
            <th>Ghế</th>
            <th>Tổng tiền</th>
            <th>Thời gian đặt</th>
            <th>Thao tác</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="ticket : ${tickets}">
            <td><strong th:text="${ticket.ticketCode}"></strong></td>
            <td th:text="${ticket.customerName}"></td>
            <td th:text="${ticket.customerPhone}"></td>
            <td th:text="${ticket.trip.route.fromLocation.name + ' → ' + ticket.trip.route.toLocation.name}"></td>
            <td th:text="${#temporals.format(ticket.trip.departureTime, 'HH:mm dd/MM')}"></td>
            <td th:text="${ticket.seat.seatNumber}"></td>
            <td th:text="${#numbers.formatInteger(ticket.totalPrice, 3, 'COMMA') + ' d'}"></td>
            <td th:text="${#temporals.format(ticket.bookingTime, 'HH:mm dd/MM')}"></td>
            <td>
                <form th:action="@{/staff/confirm-payment}" method="post" class="d-inline">
                    <input type="hidden" name="ticketId" th:value="${ticket.id}">
                    <button type="submit" class="btn btn-success btn-sm"><i class="bi bi-check-circle"></i> Xác nhận</button>
                </form>
                <form th:action="@{/staff/cancel-ticket}" method="post" class="d-inline ms-1"
                      onsubmit="return confirm('Hủy vé và giải phóng ghế?')">
                    <input type="hidden" name="ticketId" th:value="${ticket.id}">
                    <button type="submit" class="btn btn-danger btn-sm"><i class="bi bi-x-circle"></i> Hủy</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>
<div class="container mt-3">
    <a href="/" class="btn btn-secondary btn-sm"><i class="bi bi-house-door"></i> Về Trang chủ</a>
</div>
</body>
</html>
